packages:
  - 'understand-anything-plugin/packages/*'
  - 'understand-anything-plugin'
  - 'homepage'
# pnpm dropped `pnpm.onlyBuiltDependencies` from package.json (now ignored).
# Declare a verdict per build script here instead, so install exits 0 on
# pnpm >=11 (where ERR_PNPM_IGNORED_BUILDS is fatal). tree-sitter grammars are
# NOT built — web-tree-sitter loads WASM grammars (native bindings fail on
# darwin/arm64 + Node 24). esbuild/sharp are built (homepage + dashboard).
allowBuilds:
  esbuild: true
  sharp: true
  '@tree-sitter-grammars/tree-sitter-kotlin': false
  tree-sitter-c: false
  tree-sitter-c-sharp: false
  tree-sitter-cpp: false
  tree-sitter-go: false
  tree-sitter-java: false
  tree-sitter-javascript: false
  tree-sitter-php: false
  tree-sitter-python: false
  tree-sitter-ruby: false
  tree-sitter-rust: false
  tree-sitter-typescript: false
